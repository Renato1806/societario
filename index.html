<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facilita — Contratos</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0fafa;color:#1a2e2c}
    @keyframes spin{to{transform:rotate(360deg)}}
    input,select,textarea{font-family:inherit}
    @media(max-width:700px){
      .sidebar-desktop{display:none!important}
      .topbar-mobile{display:flex!important}
      .main-content{margin-left:0!important}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API_URL = 'https://script.google.com/macros/s/AKfycbyvRTOfOyjh44rJ78ijGiTLlmNX_UM6tIeVRGYtKY6aUNQ93xon6xdoxCTVlv2lFHsq/exec';

async function apiFetch(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${API_URL}?${qs}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (!json.ok) throw new Error(json.erro || 'Erro desconhecido');
  return json.data;
}

async function buscarCNPJDireto(cnpj) {
  const c = cnpj.replace(/\D/g,'');
  const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${c}`);
  if (!res.ok) throw new Error('CNPJ não encontrado');
  return res.json();
}

const C = {
  dark:'#1B6963', med:'#3E9C95', light:'#4DD9C5',
  bg:'#f0fafa', card:'#ffffff', text:'#1a2e2c', muted:'#6b8e8b', border:'#c5e1df'
};

function cap(str) {
  if (!str) return '';
  const prep = new Set(['de','da','do','das','dos','e','a','o','as','os','em','no','na','nos','nas','por','para']);
  return str.toLowerCase().split(' ').map((p,i)=> i>0&&prep.has(p)?p:p.charAt(0).toUpperCase()+p.slice(1)).join(' ');
}

function LogoIcon({ size=36 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64">
      <defs>
        <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#4DD9C5"/>
          <stop offset="100%" stopColor="#1B6963"/>
        </linearGradient>
      </defs>
      <rect width="64" height="64" rx="14" fill="url(#lg)"/>
      <path d="M18 12 C18 12 28 8 38 18 C48 28 44 40 32 44 C20 48 12 40 16 28 Z" fill="white" opacity="0.92"/>
      <path d="M46 52 C46 52 36 56 26 46 C16 36 20 24 32 20 C44 16 52 24 48 36 Z" fill="white" opacity="0.40"/>
    </svg>
  );
}
function LogoFull() {
  return (
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <LogoIcon size={38}/>
      <div style={{lineHeight:1.15}}>
        <div style={{fontWeight:800,fontSize:17,color:C.dark,letterSpacing:'-0.3px'}}>Facilita</div>
        <div style={{fontWeight:400,fontSize:10.5,color:C.med,letterSpacing:'0.4px',textTransform:'uppercase'}}>Soluções Contábeis</div>
      </div>
    </div>
  );
}

function fmtMoeda(v) {
  const n = parseFloat(v)||0;
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function badgeStatus(status) {
  const s = String(status||'').toLowerCase();
  if(s.includes('ativo'))      return {bg:'#e8f5e9',color:'#1b5e20',label:status};
  if(s.includes('vence'))      return {bg:'#fff8e1',color:'#856404',label:status};
  if(s.includes('vencido'))    return {bg:'#fdecea',color:'#b71c1c',label:status};
  if(s.includes('rescindido')) return {bg:'#f5f5f5',color:'#555',  label:status};
  return {bg:'#e8f5f4',color:C.dark,label:status||'—'};
}
function badgeAssin(status) {
  const s = String(status||'').toLowerCase();
  if(s.includes('completo'))              return {bg:'#e8f5e9',color:'#1b5e20',label:status};
  if(s.includes('aguardando')||s.includes('assinam')) return {bg:'#fff8e1',color:'#856404',label:status};
  if(!status||status==='')               return {bg:'#f5f5f5',color:'#888',  label:'—'};
  return {bg:'#e3f2fd',color:'#1565c0',label:status};
}
function Badge({text,bg,color}) {
  return <span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:11.5,fontWeight:600,background:bg,color,whiteSpace:'nowrap'}}>{text}</span>;
}
function MetricCard({icon,label,value,sub,accent}) {
  return (
    <div style={{background:C.card,borderRadius:16,padding:'20px 22px',boxShadow:'0 1px 4px rgba(27,105,99,0.08)',border:`1px solid ${C.border}`,display:'flex',flexDirection:'column',gap:4}}>
      <div style={{fontSize:22}}>{icon}</div>
      <div style={{fontSize:26,fontWeight:800,color:accent||C.dark}}>{value}</div>
      <div style={{fontSize:13,fontWeight:600,color:C.text}}>{label}</div>
      {sub&&<div style={{fontSize:11.5,color:C.muted}}>{sub}</div>}
    </div>
  );
}
function Spinner({size=36}) {
  return (
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',padding:size<20?0:60}}>
      <div style={{width:size,height:size,borderRadius:'50%',border:`${size>20?4:2}px solid ${C.border}`,borderTopColor:C.med,animation:'spin 0.8s linear infinite',flexShrink:0}}/>
    </div>
  );
}
function ErrMsg({msg,onRetry}) {
  return (
    <div style={{background:'#fdecea',border:'1px solid #f5c6cb',borderRadius:12,padding:'18px 22px',color:'#721c24',margin:'24px 0'}}>
      <strong>⚠️ Erro ao carregar dados</strong>
      <p style={{marginTop:6,fontSize:13}}>{msg}</p>
      {onRetry&&<button onClick={onRetry} style={{marginTop:12,padding:'7px 18px',borderRadius:8,background:C.med,color:'#fff',border:'none',cursor:'pointer',fontWeight:600}}>Tentar novamente</button>}
    </div>
  );
}

// ── Inputs reutilizáveis ─────────────────────────────────────────────────────
function Field({label, required, children, hint}) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:4}}>
      <label style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:'0.4px'}}>
        {label}{required&&<span style={{color:'#e53935',marginLeft:2}}>*</span>}
      </label>
      {children}
      {hint&&<span style={{fontSize:11,color:C.muted}}>{hint}</span>}
    </div>
  );
}
const inputStyle = {
  padding:'9px 12px', borderRadius:8, border:`1.5px solid ${C.border}`,
  fontSize:13.5, color:C.text, outline:'none', background:'#fff',
  transition:'border-color 0.15s', width:'100%'
};
function Inp({value, onChange, placeholder, type='text', disabled}) {
  return (
    <input
      type={type} value={value||''} placeholder={placeholder} disabled={disabled}
      onChange={e=>onChange(e.target.value)}
      style={{...inputStyle, background:disabled?'#f5f5f5':'#fff'}}
    />
  );
}
function Sel({value,onChange,options,disabled}) {
  return (
    <select value={value||''} onChange={e=>onChange(e.target.value)} disabled={disabled}
      style={{...inputStyle,cursor:'pointer',background:disabled?'#f5f5f5':'#fff'}}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
//  WIZARD — NOVO CONTRATO
// ═════════════════════════════════════════════════════════════════════════════
const FORM_INICIAL = {
  cnpj:'', nome:'', representante:'', cargo:'', cpfRepresentante:'',
  telefone:'', email:'', endereco:'', bairro:'', cidadeUF:'', cep:'',
  inicio:'', honorarios:'', diaVencimento:'10',
  qtdFuncionarios:'0', qtdNF:'0', qtdLancamentos:'0',
  observacoes:'',
  gerarDoc: true, enviarAssinatura: true,
};

function NovoContratoWizard({ onClose, onSalvo }) {
  const [step, setStep]         = useState(1);
  const [form, setForm]         = useState(FORM_INICIAL);
  const [cnpjLoading, setCnpjLoading] = useState(false);
  const [cnpjErro, setCnpjErro] = useState('');
  const [salvando, setSalvando] = useState(false);
  const [resultado, setResultado] = useState(null);
  const [erroSalvar, setErroSalvar] = useState('');

  function set(k, v) { setForm(f=>({...f,[k]:v})); }

  // Máscara CNPJ
  function maskCNPJ(v) {
    return v.replace(/\D/g,'').substring(0,14)
      .replace(/(\d{2})(\d)/,'$1.$2')
      .replace(/(\d{3})(\d)/,'$1.$2')
      .replace(/(\d{3})(\d)/,'$1/$2')
      .replace(/(\d{4})(\d)/,'$1-$2');
  }

  async function buscarCNPJ() {
    const digits = form.cnpj.replace(/\D/g,'');
    if (digits.length !== 14) { setCnpjErro('Digite os 14 dígitos do CNPJ'); return; }
    setCnpjLoading(true); setCnpjErro('');
    try {
      const d = await buscarCNPJDireto(digits);
      const qsa = d.qsa || [];
      const socio = qsa.find(s => s.qualificacao_socio && s.qualificacao_socio.toLowerCase().includes('administrador')) || qsa[0] || {};
      const cid = cap(d.municipio || '');
      const uf  = d.uf || '';
      setForm(f=>({...f,
        nome:          cap(d.razao_social || ''),
        representante: cap(socio.nome_socio || ''),
        cargo:         cap(socio.qualificacao_socio || 'Sócio Administrador'),
        telefone:      d.ddd_telefone_1 ? `(${d.ddd_telefone_1.substring(0,2)}) ${d.ddd_telefone_1.substring(2)}` : f.telefone,
        email:         (d.email||'').toLowerCase() || f.email,
        endereco:      cap(`${d.descricao_tipo_de_logradouro||''} ${d.logradouro||''}, ${d.numero||'s/n'}`),
        bairro:        cap(d.bairro || ''),
        cidadeUF:      cid&&uf ? `${cid} - ${uf}` : f.cidadeUF,
        cep:           d.cep || f.cep,
      }));
    } catch(e) {
      setCnpjErro('CNPJ não encontrado na Receita Federal');
    } finally {
      setCnpjLoading(false);
    }
  }

  async function salvar() {
    setSalvando(true); setErroSalvar('');
    try {
      const dados = {
        ...form,
        gerarDoc: true,
        enviarAssinatura: form.enviarAssinatura,
      };
      const data = await apiFetch('salvarContrato', { dados: JSON.stringify(dados) });
      setResultado(data);
      onSalvo && onSalvo();
    } catch(e) {
      setErroSalvar(e.message);
    } finally {
      setSalvando(false);
    }
  }

  // ── JSX dos passos (variáveis, não componentes, para evitar perda de foco) ──
  const step1jsx = (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <Field label="CNPJ" required>
        <div style={{display:'flex',gap:8}}>
          <Inp value={form.cnpj} onChange={v=>set('cnpj',maskCNPJ(v))} placeholder="00.000.000/0000-00"/>
          <button onClick={buscarCNPJ} disabled={cnpjLoading}
            style={{padding:'0 16px',borderRadius:8,background:C.med,color:'#fff',border:'none',cursor:'pointer',fontWeight:600,fontSize:13,whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}}>
            {cnpjLoading ? <Spinner size={16}/> : '🔍'} Buscar
          </button>
        </div>
        {cnpjErro && <span style={{fontSize:12,color:'#e53935'}}>{cnpjErro}</span>}
      </Field>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Field label="Razão Social" required>
          <Inp value={form.nome} onChange={v=>set('nome',v)} placeholder="Nome da empresa"/>
        </Field>
        <Field label="E-mail">
          <Inp value={form.email} onChange={v=>set('email',v)} placeholder="email@empresa.com.br" type="email"/>
        </Field>
        <Field label="Representante" required>
          <Inp value={form.representante} onChange={v=>set('representante',v)} placeholder="Nome completo"/>
        </Field>
        <Field label="Cargo">
          <Inp value={form.cargo} onChange={v=>set('cargo',v)} placeholder="Sócio Administrador"/>
        </Field>
        <Field label="CPF do Representante">
          <Inp value={form.cpfRepresentante} onChange={v=>set('cpfRepresentante',v)} placeholder="000.000.000-00"/>
        </Field>
        <Field label="Telefone">
          <Inp value={form.telefone} onChange={v=>set('telefone',v)} placeholder="(44) 99999-9999"/>
        </Field>
      </div>
      <Field label="Endereço">
        <Inp value={form.endereco} onChange={v=>set('endereco',v)} placeholder="Rua, número"/>
      </Field>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Field label="Bairro">
          <Inp value={form.bairro} onChange={v=>set('bairro',v)} placeholder="Bairro"/>
        </Field>
        <Field label="Cidade / UF">
          <Inp value={form.cidadeUF} onChange={v=>set('cidadeUF',v)} placeholder="Campo Mourão - PR"/>
        </Field>
      </div>
    </div>
  );

  const step2jsx = (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Field label="Data de Início" required>
          <Inp value={form.inicio} onChange={v=>set('inicio',v)} type="date"/>
        </Field>
        <Field label="Honorários (R$)" required>
          <Inp value={form.honorarios} onChange={v=>set('honorarios',v)} placeholder="0,00"/>
        </Field>
        <Field label="Dia de Vencimento" hint="Dia do mês para cobrança">
          <Sel value={form.diaVencimento} onChange={v=>set('diaVencimento',v)}
            options={Array.from({length:28},(_,i)=>({value:String(i+1),label:`Dia ${i+1}`}))}/>
        </Field>
        <Field label="Qtd. Funcionários">
          <Inp value={form.qtdFuncionarios} onChange={v=>set('qtdFuncionarios',v)} type="number" placeholder="0"/>
        </Field>
        <Field label="NFs / mês">
          <Inp value={form.qtdNF} onChange={v=>set('qtdNF',v)} type="number" placeholder="0"/>
        </Field>
        <Field label="Lançamentos / mês">
          <Inp value={form.qtdLancamentos} onChange={v=>set('qtdLancamentos',v)} type="number" placeholder="0"/>
        </Field>
      </div>
      <Field label="Observações">
        <textarea value={form.observacoes} onChange={e=>set('observacoes',e.target.value)}
          placeholder="Informações adicionais sobre o contrato..."
          style={{...inputStyle,minHeight:80,resize:'vertical'}}/>
      </Field>
    </div>
  );

  const step3rows = [
    ['CNPJ', form.cnpj],
    ['Razão Social', form.nome],
    ['Representante', `${form.representante}${form.cargo?` (${form.cargo})`:''}`],
    ['CPF Repr.', form.cpfRepresentante || '—'],
    ['E-mail', form.email || '—'],
    ['Telefone', form.telefone || '—'],
    ['Endereço', [form.endereco, form.bairro, form.cidadeUF].filter(Boolean).join(', ') || '—'],
    ['Início', form.inicio ? new Date(form.inicio+'T12:00:00').toLocaleDateString('pt-BR') : '—'],
    ['Honorários', form.honorarios ? fmtMoeda(String(form.honorarios).replace(',','.')) : '—'],
    ['Dia de Vencimento', `Dia ${form.diaVencimento}`],
    ['Funcionários', form.qtdFuncionarios],
    ['NFs/mês', form.qtdNF],
    ['Lançamentos/mês', form.qtdLancamentos],
    ...(form.observacoes ? [['Observações', form.observacoes]] : []),
  ];
  const step3jsx = (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{background:'#f8fffe',border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
        {step3rows.map(([lbl,val],i)=>(
          <div key={lbl} style={{display:'flex',padding:'8px 14px',borderBottom:i<step3rows.length-1?`1px solid ${C.border}`:'none',background:i%2?'#fff':'transparent'}}>
            <span style={{fontSize:12,fontWeight:600,color:C.muted,minWidth:140,flexShrink:0}}>{lbl}</span>
            <span style={{fontSize:13,color:C.text,wordBreak:'break-word'}}>{val}</span>
          </div>
        ))}
      </div>
      <div style={{background:'#f0fafa',border:`1px solid ${C.border}`,borderRadius:12,padding:16,display:'flex',flexDirection:'column',gap:12}}>
        <div style={{fontWeight:700,fontSize:13,color:C.dark}}>Ações ao salvar:</div>
        <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',fontSize:13}}>
          <input type="checkbox" checked={true} disabled style={{width:16,height:16,accentColor:C.med}}/>
          <span>📄 Gerar Google Doc (template preenchido)</span>
        </label>
        <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',fontSize:13}}>
          <input type="checkbox" checked={form.enviarAssinatura}
            onChange={e=>set('enviarAssinatura',e.target.checked)}
            style={{width:16,height:16,accentColor:C.med}}/>
          <span>🖊️ Enviar para ZapSign (assinatura eletrônica)</span>
        </label>
        {form.enviarAssinatura && (
          <div style={{fontSize:12,color:C.muted,background:'#e8f5f4',padding:'8px 12px',borderRadius:8}}>
            Signatários: Renato (escritório) · Cliente · Alexandre · Rafael
          </div>
        )}
      </div>
      {erroSalvar && (
        <div style={{background:'#fdecea',border:'1px solid #f5c6cb',borderRadius:10,padding:'12px 16px',color:'#721c24',fontSize:13}}>
          ⚠️ {erroSalvar}
        </div>
      )}
    </div>
  );

  // ── Sucesso ──────────────────────────────────────────────────────────────
  if (resultado) {
    return (
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>
        <div style={{background:'#fff',borderRadius:18,width:'100%',maxWidth:440,boxShadow:'0 8px 40px rgba(27,105,99,0.18)',padding:32,textAlign:'center'}}>
          <div style={{fontSize:52,marginBottom:12}}>🎉</div>
          <h2 style={{fontSize:20,fontWeight:800,color:C.dark,marginBottom:8}}>Contrato criado!</h2>
          <div style={{fontSize:14,color:C.muted,marginBottom:20}}>Número: <strong style={{color:C.dark}}>{resultado.numero}</strong></div>

          {resultado.link && resultado.link !== '—' && (
            <a href={resultado.link} target="_blank" rel="noreferrer"
              style={{display:'inline-block',padding:'10px 24px',borderRadius:10,background:C.med,color:'#fff',textDecoration:'none',fontWeight:600,marginBottom:12}}>
              📄 Abrir Contrato no Drive
            </a>
          )}

          {resultado.zap && (
            <div style={{margin:'12px 0',padding:'10px 14px',borderRadius:10,
              background: resultado.zap.sucesso?'#e8f5e9':'#fff8e1',
              color:       resultado.zap.sucesso?'#1b5e20':'#856404',
              fontSize:13}}>
              {resultado.zap.sucesso ? '✅ ' + resultado.zap.mensagem : '⚠️ ZapSign: ' + resultado.zap.erro}
            </div>
          )}

          <button onClick={onClose}
            style={{marginTop:8,padding:'10px 28px',borderRadius:10,background:C.dark,color:'#fff',border:'none',cursor:'pointer',fontWeight:600,fontSize:14}}>
            Fechar
          </button>
        </div>
      </div>
    );
  }

  // ── Modal principal ──────────────────────────────────────────────────────
  const STEPS = ['Dados do Cliente','Detalhes do Contrato','Revisão'];
  const canNext1 = form.cnpj.replace(/\D/g,'').length===14 && form.nome && form.representante;
  const canNext2 = form.inicio && form.honorarios;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>
      <div style={{background:'#fff',borderRadius:18,width:'100%',maxWidth:620,maxHeight:'92vh',display:'flex',flexDirection:'column',boxShadow:'0 8px 40px rgba(27,105,99,0.18)'}}>

        {/* Header */}
        <div style={{background:C.dark,padding:'16px 22px',borderRadius:'18px 18px 0 0',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div style={{color:'#fff',fontWeight:700,fontSize:16}}>➕ Novo Contrato</div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'#fff',borderRadius:8,width:32,height:32,cursor:'pointer',fontSize:20,lineHeight:'32px',textAlign:'center'}}>×</button>
        </div>

        {/* Steps indicator */}
        <div style={{display:'flex',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          {STEPS.map((s,i)=>(
            <div key={i} style={{flex:1,padding:'12px 8px',textAlign:'center',
              borderBottom:step===i+1?`3px solid ${C.med}`:'3px solid transparent',
              color:step===i+1?C.dark:step>i+1?C.med:C.muted,
              fontWeight:step===i+1?700:400,fontSize:12.5,cursor:'default',
              background:step===i+1?'#f0fafa':'#fff',transition:'all 0.15s'}}>
              <span style={{display:'inline-block',width:20,height:20,borderRadius:'50%',textAlign:'center',lineHeight:'20px',fontSize:11,fontWeight:700,marginRight:6,
                background:step>i+1?C.med:step===i+1?C.dark:'#e0e0e0',
                color:'#fff'}}>
                {step>i+1?'✓':i+1}
              </span>
              {s}
            </div>
          ))}
        </div>

        {/* Conteúdo */}
        <div style={{overflowY:'auto',flex:1,padding:'20px 22px'}}>
          {step===1 && step1jsx}
          {step===2 && step2jsx}
          {step===3 && step3jsx}
        </div>

        {/* Footer */}
        <div style={{padding:'14px 22px',borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',flexShrink:0,background:'#fafffe',borderRadius:'0 0 18px 18px'}}>
          <button onClick={step===1?onClose:()=>setStep(s=>s-1)}
            style={{padding:'9px 20px',borderRadius:10,background:'#f0f0f0',border:'none',cursor:'pointer',fontWeight:600,fontSize:13,color:C.text}}>
            {step===1?'Cancelar':'← Voltar'}
          </button>

          {step < 3 ? (
            <button onClick={()=>setStep(s=>s+1)}
              disabled={step===1?!canNext1:!canNext2}
              style={{padding:'9px 24px',borderRadius:10,background:(step===1?canNext1:canNext2)?C.med:'#ccc',color:'#fff',border:'none',cursor:(step===1?canNext1:canNext2)?'pointer':'not-allowed',fontWeight:700,fontSize:13}}>
              Próximo →
            </button>
          ) : (
            <button onClick={salvar} disabled={salvando}
              style={{padding:'9px 24px',borderRadius:10,background:salvando?'#ccc':C.dark,color:'#fff',border:'none',cursor:salvando?'not-allowed':'pointer',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:8}}>
              {salvando ? <><Spinner size={16}/> Salvando...</> : '✅ Criar Contrato'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
//  DASHBOARD
// ═════════════════════════════════════════════════════════════════════════════
function Dashboard({ onNovoContrato }) {

  const [loading,setLoading] = useState(true);
  const [error,setError]     = useState(null);

  const load = useCallback(async()=>{
    setLoading(true);setError(null);
    try{ const d=await apiFetch('dashboard'); setData(d); }
    catch(e){ setError(e.message); }
    finally{ setLoading(false); }
  },[]);
  useEffect(()=>{ load(); },[]);

  if(loading) return <Spinner/>;
  if(error)   return <ErrMsg msg={error} onRetry={load}/>;
  if(!data)   return null;

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <h2 style={{fontSize:20,fontWeight:700,color:C.dark}}>Painel de Controle</h2>
        <button onClick={onNovoContrato} style={{padding:'9px 20px',borderRadius:10,background:C.dark,color:'#fff',border:'none',cursor:'pointer',fontWeight:700,fontSize:13}}>
          ➕ Novo Contrato

      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(175px,1fr))',gap:14,marginBottom:28}}>
        <MetricCard icon="👥" label="Clientes Ativos"     value={data.ativos}            accent={C.dark}/>
        <MetricCard icon="💰" label="Receita Mensal"      value={fmtMoeda(data.mrr)}     accent="#1b5e20" sub="MRR"/>
        <MetricCard icon="⚠️" label="Vencendo (60d)"     value={data.vencendo}          accent="#856404"/>
        <MetricCard icon="🔴" label="Vencidos"            value={data.vencidos}          accent="#b71c1c"/>
        <MetricCard icon="🖊️" label="Assinados (ZapSign)" value={data.assinados}         accent={C.med}/>
        <MetricCard icon="📄" label="Total de Contratos"  value={data.total}             accent={C.dark}/>
      </div>
      <div style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(27,105,99,0.07)',overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,background:C.dark}}>
          <h3 style={{color:'#fff',fontSize:14,fontWeight:600}}>📋 Últimos Contratos</h3>

        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:'#f0fafa'}}>
                {['Nº','Cliente','Vencimento','Honorários','Status','Assinatura'].map(h=>(
                  <th key={h} style={{padding:'10px 14px',textAlign:'left',fontWeight:600,color:C.muted,fontSize:12,borderBottom:`1px solid ${C.border}`}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {!(data.recentes||[]).length
                ? <tr><td colSpan={6} style={{padding:30,textAlign:'center',color:C.muted}}>Nenhum contrato cadastrado</td></tr>
                : (data.recentes||[]).map((c,i)=>{
                    const bs=badgeStatus(c.status), ba=badgeAssin(c.statusAssin);
                    return (
                      <tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:i%2?'#fafffe':'#fff'}}>
                        <td style={{padding:'10px 14px',fontWeight:600,color:C.dark}}>{c.numero}</td>
                        <td style={{padding:'10px 14px',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.cliente}</td>
                        <td style={{padding:'10px 14px',color:C.muted}}>{c.vencimento}</td>
                        <td style={{padding:'10px 14px',fontWeight:600,color:'#1b5e20'}}>{fmtMoeda(c.honorario)}</td>
                        <td style={{padding:'10px 14px'}}><Badge text={bs.label} bg={bs.bg} color={bs.color}/></td>
                        <td style={{padding:'10px 14px'}}><Badge text={ba.label} bg={ba.bg} color={ba.color}/></td>

function DetalheModal({contrato:c,onClose}) {

        <div style={{background:C.dark,padding:'16px 22px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <div style={{color:'rgba(255,255,255,0.7)',fontSize:12,fontWeight:500}}>{c.numero}</div>
            <div style={{color:'#fff',fontSize:17,fontWeight:700}}>{c.cliente}</div>
          </div>

        </div>
        <div style={{overflowY:'auto',flex:1}}>

              ['Telefone',c.telefone],['E-mail',c.email],
              ['Honorários',fmtMoeda(c.honorario)],['Dia Vcto',c.diaVcto?`Dia ${c.diaVcto}`:'—'],
              ['Início',c.inicio],['Vencimento',c.vencimento],

        <div style={{padding:'12px 22px',borderTop:`1px solid ${C.border}`,display:'flex',gap:10,justifyContent:'flex-end',flexShrink:0}}>
          {c.linkContrato&&c.linkContrato!=='—'&&(
            <a href={c.linkContrato} target="_blank" rel="noreferrer" style={{padding:'8px 18px',borderRadius:8,background:C.med,color:'#fff',textDecoration:'none',fontWeight:600,fontSize:13}}>📄 Abrir Contrato</a>
          )}
          <button onClick={onClose} style={{padding:'8px 18px',borderRadius:8,background:'#f0f0f0',border:'none',cursor:'pointer',fontWeight:600,fontSize:13,color:C.text}}>Fechar</button>
        </div>
      </div>
    </div>
  );
}

function Contratos({ onNovoContrato }) {
  const [lista,setLista]   = useState([]);
  const [loading,setLoading] = useState(true);
  const [error,setError]   = useState(null);
  const [busca,setBusca]   = useState('');
  const [filtro,setFiltro] = useState('todos');
  const [detalhe,setDetalhe] = useState(null);

  const load = useCallback(async()=>{
    setLoading(true);setError(null);
    try{ const d=await apiFetch('contratos'); setLista(d); }
    catch(e){ setError(e.message); }
    finally{ setLoading(false); }
  },[]);
  useEffect(()=>{ load(); },[]);

  const filtrados = lista.filter(c=>{
    const s=String(c.status||'').toLowerCase();
    const ok = filtro==='todos'?true:filtro==='ativos'?s.includes('ativo'):filtro==='vencendo'?s.includes('vence'):filtro==='vencidos'?s.includes('vencido'):s.includes('rescindido');
    const t=busca.toLowerCase();
    const okb=!t||String(c.cliente||'').toLowerCase().includes(t)||String(c.cnpj||'').includes(t)||String(c.numero||'').toLowerCase().includes(t)||String(c.email||'').toLowerCase().includes(t);
    return ok&&okb;
  });

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <h2 style={{fontSize:20,fontWeight:700,color:C.dark}}>Contratos</h2>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar cliente, CNPJ…"
            style={{padding:'8px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,outline:'none',minWidth:200}}/>
          <select value={filtro} onChange={e=>setFiltro(e.target.value)}
            style={{padding:'8px 12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:13,color:C.text,background:'#fff'}}>
            <option value="todos">Todos</option>
            <option value="ativos">🟢 Ativos</option>
            <option value="vencendo">🟡 Vencendo</option>
            <option value="vencidos">🔴 Vencidos</option>
            <option value="rescindidos">⚫ Rescindidos</option>
          </select>
          <button onClick={load} style={{padding:'8px 14px',borderRadius:10,background:'#f0f0f0',color:C.text,border:`1px solid ${C.border}`,cursor:'pointer',fontSize:13}}>🔄</button>
          <button onClick={onNovoContrato} style={{padding:'8px 18px',borderRadius:10,background:C.dark,color:'#fff',border:'none',cursor:'pointer',fontWeight:700,fontSize:13}}>
            ➕ Novo Contrato
          </button>
        </div>
      </div>
      {loading&&<Spinner/>}
      {!loading&&error&&<ErrMsg msg={error} onRetry={load}/>}
      {!loading&&!error&&(
        <div style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(27,105,99,0.07)',overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{background:C.dark}}>
                  {['Nº','Cliente','CNPJ','E-mail','Honorários','Vencimento','Status','Assinatura',''].map(h=>(
                    <th key={h} style={{padding:'11px 13px',textAlign:'left',fontWeight:600,color:'#fff',fontSize:12}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {!filtrados.length
                  ? <tr><td colSpan={9} style={{padding:30,textAlign:'center',color:C.muted}}>Nenhum contrato encontrado</td></tr>
                  : filtrados.map((c,i)=>{
                      const bs=badgeStatus(c.status), ba=badgeAssin(c.statusAssin);
                      return (
                        <tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:i%2?'#fafffe':'#fff',cursor:'pointer'}} onClick={()=>setDetalhe(c)}>
                          <td style={{padding:'10px 13px',fontWeight:700,color:C.dark}}>{c.numero}</td>
                          <td style={{padding:'10px 13px',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500}}>{c.cliente}</td>
                          <td style={{padding:'10px 13px',color:C.muted,fontFamily:'monospace',fontSize:12}}>{c.cnpj}</td>
                          <td style={{padding:'10px 13px',color:C.muted,fontSize:12}}>{c.email}</td>
                          <td style={{padding:'10px 13px',fontWeight:600,color:'#1b5e20'}}>{fmtMoeda(c.honorario)}</td>
                          <td style={{padding:'10px 13px',color:C.muted}}>{c.vencimento}</td>
                          <td style={{padding:'10px 13px'}}><Badge text={bs.label} bg={bs.bg} color={bs.color}/></td>
                          <td style={{padding:'10px 13px'}}><Badge text={ba.label} bg={ba.bg} color={ba.color}/></td>
                          <td style={{padding:'10px 13px'}}>
                            {c.linkContrato&&c.linkContrato!=='—'&&(
                              <a href={c.linkContrato} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{color:C.med,textDecoration:'none',fontWeight:600,fontSize:12}}>📄 Doc</a>
                            )}
                          </td>
                        </tr>
                      );
                    })
                }
              </tbody>
            </table>
          </div>
          <div style={{padding:'10px 16px',borderTop:`1px solid ${C.border}`,color:C.muted,fontSize:12}}>
            {filtrados.length} contrato{filtrados.length!==1?'s':''} exibido{filtrados.length!==1?'s':''}
            {(busca||filtro!=='todos')?` (filtrado de ${lista.length})`:''}
          </div>
        </div>
      )}
      {detalhe&&<DetalheModal contrato={detalhe} onClose={()=>setDetalhe(null)}/>}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
//  APP PRINCIPAL
// ═════════════════════════════════════════════════════════════════════════════
const VIEWS = [
  {id:'dashboard',icon:'📊',label:'Dashboard'},
  {id:'contratos',icon:'📄',label:'Contratos'},
  {id:'config',   icon:'⚙️', label:'Configurações'},
];

function App() {
  const [view,setView]           = useState('dashboard');
  const [sideOpen,setSideOpen]   = useState(false);
  const [showWizard,setShowWizard] = useState(false);
  const [refreshKey,setRefreshKey] = useState(0);

  function abrirNovoContrato() { setShowWizard(true); }
  function fecharWizard()      { setShowWizard(false); setRefreshKey(k=>k+1); }

  function navStyle(v) {
    return {
      display:'flex',alignItems:'center',gap:10,padding:'10px 16px',
      borderRadius:10,cursor:'pointer',fontSize:14,fontWeight:500,
      background:view===v.id?'#e8f5f4':'transparent',
      color:      view===v.id?C.dark:C.muted,
      border:     view===v.id?`1px solid ${C.border}`:'1px solid transparent',
    };
  }

  const renderView = () => {
    if(view==='dashboard') return <Dashboard key={refreshKey} onNovoContrato={abrirNovoContrato}/>;
    if(view==='contratos') return <Contratos key={refreshKey} onNovoContrato={abrirNovoContrato}/>;
    if(view==='config')    return <Configuracoes/>;
    return null;
  };

  return (
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* Sidebar desktop */}
      <aside className="sidebar-desktop" style={{
        width:220,background:'#fff',borderRight:`1px solid ${C.border}`,
        display:'flex',flexDirection:'column',padding:'20px 12px',
        position:'fixed',top:0,bottom:0,left:0,zIndex:100,overflowY:'auto'
      }}>
        <div style={{marginBottom:28,paddingLeft:4}}><LogoFull/></div>
        <nav style={{display:'flex',flexDirection:'column',gap:4,flex:1}}>
          {VIEWS.map(v=>(
            <div key={v.id} style={navStyle(v)} onClick={()=>setView(v.id)}>
              <span>{v.icon}</span> {v.label}
            </div>
          ))}
        </nav>
        <button onClick={abrirNovoContrato} style={{
          margin:'8px 4px 16px',padding:'10px 14px',borderRadius:10,
          background:C.dark,color:'#fff',border:'none',cursor:'pointer',
          fontWeight:700,fontSize:13,textAlign:'left',display:'flex',alignItems:'center',gap:8
        }}>➕ Novo Contrato</button>
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,fontSize:11.5,color:C.muted,paddingLeft:4}}>
          <div style={{fontWeight:600}}>Facilita Contábil</div>
          <div>v2.0 — Etapa 2</div>
        </div>
      </aside>

      {/* Sidebar mobile overlay */}
      {sideOpen&&(
        <div style={{position:'fixed',inset:0,zIndex:200}}>
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.35)'}} onClick={()=>setSideOpen(false)}/>
          <aside style={{position:'absolute',top:0,bottom:0,left:0,width:230,background:'#fff',padding:'20px 12px',display:'flex',flexDirection:'column',overflowY:'auto'}}>
            <div style={{marginBottom:28,paddingLeft:4}}><LogoFull/></div>
            <nav style={{display:'flex',flexDirection:'column',gap:4,flex:1}}>
              {VIEWS.map(v=>(
                <div key={v.id} style={navStyle(v)} onClick={()=>{setView(v.id);setSideOpen(false);}}>
                  <span>{v.icon}</span> {v.label}
                </div>
              ))}
            </nav>
            <button onClick={()=>{abrirNovoContrato();setSideOpen(false);}} style={{
              margin:'8px 4px 16px',padding:'10px 14px',borderRadius:10,
              background:C.dark,color:'#fff',border:'none',cursor:'pointer',fontWeight:700,fontSize:13
            }}>➕ Novo Contrato</button>
          </aside>
        </div>
      )}

      {/* Conteúdo */}
      <main className="main-content" style={{flex:1,marginLeft:220,minHeight:'100vh',display:'flex',flexDirection:'column'}}>
        <div className="topbar-mobile" style={{display:'none',padding:'12px 16px',background:'#fff',borderBottom:`1px solid ${C.border}`,alignItems:'center',gap:12}}>
          <button onClick={()=>setSideOpen(true)} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:C.dark}}>☰</button>
          <LogoFull/>
        </div>
        <div style={{flex:1,padding:'28px 28px 40px',maxWidth:1100}}>
          {renderView()}
        </div>
      </main>

      {showWizard && <NovoContratoWizard onClose={fecharWizard} onSalvo={fecharWizard}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
